<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RW Defender - Arcade Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 640px;
            height: 480px;
        }
        #space-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            z-index: 0;
            object-fit: cover;
            filter: brightness(0.4) saturate(0.65) contrast(0.9);
        }
        #background-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.55;
        }
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
            border: 1px solid #222;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <img id="space-bg" src="" alt="" aria-hidden="true" />
        <canvas id="background-canvas" width="640" height="480"></canvas>
        <canvas id="game-canvas" width="640" height="480"></canvas>
    </div>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-dir" href="assets/backgrounds" />
</body>
</html>
